name: SonarCloud Analysis
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: xdebug
          coverage: xdebug
      - name: Install dependencies
        run: composer install --no-interaction
      - name: Setup Laravel
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force
      - name: Run tests with coverage
        run: |
          mkdir -p reports
          XDEBUG_MODE=coverage ./vendor/bin/phpunit --coverage-clover=reports/coverage.xml || true
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=asmaasma13154-sketch_hotel-app
            -Dsonar.organization=asmaasma13154-sketch
            -Dsonar.sources=app,routes,database
            -Dsonar.tests=tests
            -Dsonar.php.coverage.reportPaths=reports/coverage.xml
            -Dsonar.exclusions=vendor/**,node_modules/**,public/**,storage/**
